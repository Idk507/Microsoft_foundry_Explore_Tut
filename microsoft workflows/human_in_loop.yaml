kind: workflow
name: human-in-loop-workflow
trigger:
  kind: OnConversationStart
  id: trigger_id
  actions:
    - kind: SetVariable
      id: set_project
      variable: Local.OriginalInput
      value: =System.LastMessage.Text
    - kind: Question
      id: question_confirm
      variable: Local.ConfirmedInput
      prompt: "CONFIRM: Please re-enter your input to confirm"
      entity: StringPrebuiltEntity
      alwaysPrompt: false
    - kind: ConditionGroup
      id: check_completion
      conditions:
        - id: check_confirm
          condition: =Local.OriginalInput <> Local.ConfirmedInput
          actions:
            - kind: SendActivity
              id: sendActivity_mismatch
              activity: '"{Local.ConfirmedInput}" does not match the original input of "{Local.OriginalInput}". Please try again.'
            - kind: GotoAction
              id: goto_again
              actionId: question_confirm
      elseActions:
        - kind: SendActivity
          id: sendActivity_confirmed
          activity: |-
            You entered:
                {Local.OriginalInput}

            Confirmed input:
                {Local.ConfirmedInput}
id: ""
description: ""

