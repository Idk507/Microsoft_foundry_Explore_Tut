kind: workflow
name: enterprise-chat-workflow
description: Multi agent orchestration workflow

actions:

  - kind: Trigger
    id: start
    trigger: OnConversationStart


  - kind: Question
    id: ask_user
    variable: userQuery
    prompt: |
      Hello! What can I help you with today?


  - kind: InvokeAzureAgent
    id: classify_intent
    agent:
      name: intent-classifier
    input:
      message: =userQuery
    resultVariable: intentResult


  - kind: ParseValue
    id: parse_intent
    value: =intentResult.intent
    variable: intentType


  - kind: ConditionGroup
    id: intent_router


  - kind: ConditionItem
    id: research_flow
    parentId: intent_router
    condition: =intentType == "research"

    actions:

      - kind: InvokeAzureAgent
        id: research_agent
        agent:
          name: Web-Research-Agent
        input:
          message: =userQuery
        resultVariable: researchOutput


      - kind: InvokeAzureAgent
        id: summarization_agent
        agent:
          name: Summarization-Agent
        input:
          message: =researchOutput
        resultVariable: summaryOutput


      - kind: InvokeAzureAgent
        id: response_agent
        agent:
          name: Response-agent
        input:
          message: =summaryOutput
        resultVariable: finalAnswer


      - kind: SendActivity
        id: send_answer
        activity: =finalAnswer


  - kind: ConditionItem
    id: chat_flow
    parentId: intent_router
    condition: =intentType != "research"

    actions:

      - kind: InvokeAzureAgent
        id: general_chat_agent
        agent:
          name: General-Chat-Agent
        input:
          message: =userQuery
        resultVariable: chatResponse


      - kind: SendActivity
        id: send_chat
        activity: =chatResponse
